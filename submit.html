<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send something in — Unfinished Drafts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <span class="drawer-label">Peek into my brain &middot; Est. 2026</span>
  <h1 class="site-title">Unfinished Drafts</h1>
  <p class="site-tagline">Got something you wrote, half-finished or not? Drop it here — if it's good, it'll show up in the drawer with your name on it.</p>

  <nav class="top-nav">
    <a href="index.html">The Drawer</a>
    <a href="write.html" id="write-nav-link" style="display:none;">Write an Entry</a>
    <a href="submit.html" class="active">Send Something In</a>
    <a href="inbox.html" id="inbox-nav-link" style="display:none;">Inbox</a>
  </nav>

  <div class="notebook" id="notebook-wrap">
    <div class="notebook-top">
      <div style="flex:1;">
        <div class="prompt-line">This goes to the hidden box, not straight to the drawer</div>
        <input type="text" id="title-input" class="title-input" placeholder="What's it called?">
      </div>
      <div class="stamp" id="stamp">Draft</div>
    </div>

    <label class="field-label" for="author-input">Your name (optional — leave blank to stay anonymous)</label>
    <input type="text" id="author-input" class="field-input" placeholder="e.g. your name, or leave blank">

    <div class="toolbar">
      <button type="button" data-cmd="bold"><b>B</b></button>
      <button type="button" data-cmd="italic"><i>I</i></button>
      <button type="button" data-cmd="formatBlock" data-value="H2">Heading</button>
      <button type="button" data-cmd="formatBlock" data-value="BLOCKQUOTE">Quote</button>
      <button type="button" data-cmd="insertUnorderedList">List</button>
      <button type="button" data-cmd="removeFormat">Clear</button>
    </div>

    <div class="editor" id="editor" contenteditable="true"
         data-placeholder="Write whatever you've got."></div>

    <div class="notebook-footer">
      <span class="word-count" id="word-count">0 words</span>
      <button class="btn btn-primary" id="submit-btn">Send it in</button>
    </div>
    <div class="encourage" id="encourage"></div>
  </div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
